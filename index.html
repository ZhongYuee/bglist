<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重雨桌遊櫃</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
    h1 { color: #333; margin-bottom: 20px; }
    
    #filter-container {
      margin-bottom: 30px;
      display: none; 
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .filter-btn {
      padding: 8px 18px;
      background-color: #fff;
      border: 2px solid #4F5C48; 
      color: #4F5C48;          
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
    }
    .filter-btn:hover, .filter-btn.active {
      background-color: #4F5C48; 
      color: white;
      box-shadow: 0 4px 10px rgba(79, 92, 72, 0.3); 
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
      border: 1px solid #eee;
      text-align: center;
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
    
    .img-container {
      width: 100%;
      position: relative;
      padding-bottom: 100%;
      background-color: #fff;
      border-bottom: 1px solid #f5f5f5;
    }
    .card img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain; 
      padding: 10px; 
      box-sizing: border-box;
    }

    .card-content { 
      padding: 15px; 
      flex-grow: 1; 
      display: flex; 
      flex-direction: column; 
      justify-content: flex-start; 
    }
    .card h3 { margin: 0 0 6px; font-size: 1.2em; color: #2c3e50; line-height: 1.3; } 
    .info-row { display: flex; align-items: center; justify-content: center; margin-bottom: 4px; font-size: 0.9em; color: #555; } 
    .info-icon { width: 22px; margin-right: 4px; text-align: center; }

    .description { 
      margin-top: 8px; 
      font-size: 0.85em; 
      color: #7f8c8d; 
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 5px;
    }

    #status-msg { margin: 20px; color: #4F5C48; font-weight: bold; font-size: 1.1em; }
    #debug-box { color: red; font-weight: bold; margin: 20px auto; padding: 10px; border: 2px dashed red; display: none; background: #fff0f0; max-width: 800px; text-align: left; }

    /* 手機版 RWD 專屬設定 */
    @media (max-width: 600px) {
      body { padding: 10px; } 
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .card-content { padding: 10px; } 
      .card h3 { font-size: 1em; margin: 0 0 4px; } 
      .info-row { font-size: 0.75em; margin-bottom: 2px; } 
      .info-icon { width: 16px; margin-right: 2px; }
      .description { font-size: 0.75em; margin-top: 6px; -webkit-line-clamp: 2; }
      #filter-container { gap: 6px; margin-bottom: 20px; }
      .filter-btn { padding: 6px 12px; font-size: 0.85em; } 
    }
  </style>
</head>
<body>

  <h1>🎲 重雨桌遊櫃 🎲</h1>
  
  <div id="filter-container">
    <button class="filter-btn active" onclick="filterGames('全部', this)">全部</button>
  </div>

  <div id="status-msg">🔍 系統啟動中...</div>
  <div id="debug-box"></div>
  <div class="grid" id="bg-list"></div>

  <script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUS0MI9cUclJMJHd6yMJJUQFIFbl1G7XqRtMP5q5H1nMQOzTrcmdGTrn1R_QtEQC5dhkxuGhheKyKw/pub?output=csv'; 
    let allGames = [];
    const statusMsg = document.getElementById('status-msg');
    const debugBox = document.getElementById('debug-box');

    // 步驟 1：向 Google 發出直連請求
    statusMsg.innerText = '📡 [1/3] 正在向 Google 試算表連線索取資料...';

    fetch(csvUrl)
      .then(response => {
        if (!response.ok) {
          throw new Error(`網路回應異常 (狀態碼: ${response.status})`);
        }
        return response.text(); // 成功拿到資料，準備解碼
      })
      .then(csvText => {
        // 步驟 2：解析資料
        statusMsg.innerText = '⚙️ [2/3] 資料下載完成！正在解析桌遊清單...';
        
        Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          transformHeader: function(header) {
            return header.replace(/^\uFEFF/, '').trim().toUpperCase();
          },
          complete: function(results) {
            // 步驟 3：畫面渲染
            statusMsg.innerText = '📦 [3/3] 正在將桌遊上架到櫃子裡...';
            
            const data = results.data;
            allGames = data.filter(game => game.NAME && game.NAME.trim() !== '');

            if (allGames.length === 0) {
              const actualHeaders = data.length > 0 ? Object.keys(data[0]).join(', ') : '無標題';
              debugBox.style.display = 'block';
              debugBox.innerHTML = `⚠️ 找不到有效的桌遊名稱 (NAME 欄位)。<br>程式目前讀到的標題有：[ ${actualHeaders} ]`;
              statusMsg.style.display = 'none';
              return;
            }

            // 大功告成，隱藏進度條，顯示按鈕跟卡片
            statusMsg.style.display = 'none';
            document.getElementById('filter-container').style.display = 'flex';
            createFilterButtons();
            displayGames(allGames);
          }
        });
      })
      .catch(error => {
        // 如果有任何網路阻擋，這裡絕對會抓出來
        debugBox.style.display = 'block';
        debugBox.innerHTML = `❌ 連線發生錯誤：<br>${error.message}<br>這可能是瀏覽器阻擋或是網址權限的問題。`;
        statusMsg.style.display = 'none';
      });


    function createFilterButtons() {
      const container = document.getElementById('filter-container');
      const types = new Set();
      
      allGames.forEach(game => {
        const typeStr = game.TYPE || '';
        if (typeStr) {
          typeStr.split(/[,，/ ]+/).forEach(t => {
            if(t.trim() !== '') types.add(t.trim());
          });
        }
      });

      Array.from(types).sort().forEach(type => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.innerText = type;
        btn.onclick = () => filterGames(type, btn);
        container.appendChild(btn);
      });
    }

    function filterGames(type, activeBtn) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      activeBtn.classList.add('active');

      const filtered = type === '全部' 
        ? allGames 
        : allGames.filter(game => {
            const gameType = game.TYPE || '';
            return gameType.includes(type);
          });
      
      displayGames(filtered);
    }

    function displayGames(games) {
      const container = document.getElementById('bg-list');
      container.innerHTML = '';

      games.forEach(game => {
        const name = game.NAME;
        const imgPath = game.IMAGE || 'https://via.placeholder.com/300x300?text=No+Image';
        const players = game.PLAYER || '--';
        const time = game.TIME || '--';
        const desc = game.DESCRIPTION || game.DESCRIP || '尚無內容介紹。';

        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <div class="img-container">
            <img src="${imgPath}" alt="${name}" onerror="this.onerror=null; this.src='https://via.placeholder.com/300x300?text=Image+Error'">
          </div>
          <div class="card-content">
            <h3>${name}</h3>
            <div class="info-row"><span class="info-icon">👥</span> 人數：${players} 人</div>
            <div class="info-row"><span class="info-icon">⏳</span> 時間：${time} 分鐘</div>
            <div class="description">${desc}</div>
          </div>
        `;
        container.appendChild(card);
      });
    }
  </script>

</body>
</html>
