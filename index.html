<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重雨桌遊櫃</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎲</text></svg>">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
    h1 { color: #333; margin-bottom: 20px; }
    #filter-container { margin-bottom: 30px; display: none; flex-wrap: wrap; justify-content: center; gap: 10px; }
    
    .filter-btn { 
      padding: 8px 18px; 
      background-color: #fff; 
      border: 2px solid #4F5C48; 
      color: #4F5C48; 
      border-radius: 25px; 
      cursor: pointer; 
      font-weight: bold; 
      transition: all 0.2s; 
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-btn:focus { outline: none; } 
    .filter-btn:hover, .filter-btn.active { background-color: #4F5C48; color: white; box-shadow: 0 4px 10px rgba(79,92,72,0.3); }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
    
    .card { background: #fff; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); overflow: hidden; display: flex; flex-direction: column; transition: box-shadow 0.3s; border: 1px solid #eee; text-align: center; }
    .card:hover { box-shadow: 0 12px 35px rgba(0,0,0,0.25); }
    
    .img-container { width: 100%; position: relative; padding-bottom: 100%; background-color: #fff; border-bottom: 1px solid #f5f5f5; }
    .card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; padding: 10px; box-sizing: border-box; }
    .card-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; }
    .card h3 { margin: 0 0 6px; font-size: 1.2em; color: #2c3e50; line-height: 1.3; } 
    .info-row { display: flex; align-items: center; justify-content: center; margin-bottom: 4px; font-size: 0.9em; color: #555; } 
    .description { margin-top: 8px; font-size: 0.85em; color: #7f8c8d; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
    #status-msg { margin: 20px; color: #4F5C48; font-weight: bold; font-size: 1.1em; }

    @media (max-width: 768px) {
      body { padding: 8px; } h1 { font-size: 1.4em; margin-bottom: 12px; }
      #filter-container { gap: 6px; margin-bottom: 15px; }
      .filter-btn { padding: 5px 12px; font-size: 0.85em; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; } 
      .card h3 { font-size: 0.95em; } .info-row { font-size: 0.75em; }
      .description { font-size: 0.75em; }
    }
  </style>
</head>
<body>

  <h1>🎲 重雨桌遊櫃 🎲</h1>
  <div id="filter-container">
    <button id="btn-all" class="filter-btn active" onclick="filterGames('全部', this)">全部</button>
  </div>
  <div id="status-msg">正在翻找桌遊櫃...</div>
  <div class="grid" id="bg-list"></div>

  <script>
    const baseCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUS0MI9cUclJMJHd6yMJJUQFIFbl1G7XqRtMP5q5H1nMQOzTrcmdGTrn1R_QtEQC5dhkxuGhheKyKw/pub?output=csv';
    const fallbackImg = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='300' height='300'%3E%3Crect width='100%25' height='100%25' fill='%23f5f5f5'/%3E%3Ctext x='50%25' y='50%25' font-family='sans-serif' font-weight='bold' font-size='20' text-anchor='middle' dominant-baseline='middle' fill='%23aaaaaa'%3E尚無圖片%3C/text%3E%3C/svg%3E";
    let allGames = [];

    function getOptimizedImg(url) {
      if (!url) return fallbackImg;
      if (url.match(/imgur\.com\/[A-Za-z0-9]+(\.jpg|\.png|\.jpeg|\.gif)$/i)) {
        return url.replace(/(\.[a-zA-Z0-9]+)$/, 'l$1');
      }
      return url;
    }

    async function startLoading() {
      const freshUrl = `${baseCsvUrl}&t=${new Date().getTime()}`;
      try {
        const response = await fetch(freshUrl);
        if (response.ok) {
          const text = await response.text();
          parseAndDisplay(text);
        } else {
          loadViaPapa();
        }
      } catch (e) {
        loadViaPapa();
      }
    }

    function loadViaPapa() {
      Papa.parse(baseCsvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        transformHeader: h => h.replace(/^\uFEFF/, '').trim().toUpperCase(),
        complete: (results) => {
          if (results.data && results.data.length > 0) {
            allGames = results.data.filter(g => g.NAME);
            renderAll();
          }
        }
      });
    }

    function parseAndDisplay(csvText) {
      Papa.parse(csvText, {
        header: true,
        skipEmptyLines: true,
        transformHeader: h => h.replace(/^\uFEFF/, '').trim().toUpperCase(),
        complete: (results) => {
          allGames = results.data.filter(g => g.NAME);
          renderAll();
        }
      });
    }

    function renderAll() {
      const status = document.getElementById('status-msg');
      if (status) status.style.display = 'none';
      document.getElementById('filter-container').style.display = 'flex';
      
      const container = document.getElementById('filter-container');
      const typesInData = new Set();
      allGames.forEach(g => {
        if (g.TYPE) g.TYPE.split(/[,，/ ]+/).forEach(t => t.trim() && typesInData.add(t.trim()));
      });

      const sortedOrder = ["重策", "輕策", "派對", "小遊戲"];
      const finalOrder = [];

      sortedOrder.forEach(type => {
        if (typesInData.has(type)) {
          finalOrder.push(type);
          typesInData.delete(type);
        }
      });

      const otherTypes = Array.from(typesInData).sort();
      const combinedTypes = finalOrder.concat(otherTypes);

      combinedTypes.forEach(type => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn'; btn.innerText = type;
        btn.onclick = (e) => filterGames(type, e.target);
        container.appendChild(btn);
      });

      displayGames(allGames);
    }

    function filterGames(type, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      const cards = document.querySelectorAll('.card');
      cards.forEach(card => {
        const cardTypes = card.getAttribute('data-type') || '';
        if (type === '全部' || cardTypes.includes(type)) {
          card.style.display = ''; 
        } else {
          card.style.display = 'none'; 
        }
      });
    }

    function displayGames(games) {
      const container = document.getElementById('bg-list');
      container.innerHTML = games.map(g => {
        const optimizedImgUrl = getOptimizedImg(g.IMAGE);
        return `
          <div class="card" data-type="${g.TYPE || ''}">
            <div class="img-container">
              <img src="${optimizedImgUrl}" alt="${g.NAME}" loading="lazy" onerror="this.onerror=null; this.src='${fallbackImg}'">
            </div>
            <div class="card-content">
              <h3>${g.NAME}</h3>
              <div class="info-row">
                👥 ${g.PLAYER || '--'} 人 ⏳ ${g.TIME || '--'} 分鐘
              </div>
              <div class="description">${g.DESCRIPTION || g.DESCRIP || ''}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    window.onload = startLoading;
  </script>
</body>
</html>
