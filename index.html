<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重雨桌遊櫃</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
    h1 { color: #333; margin-bottom: 20px; }
    
    #filter-container {
      margin-bottom: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .filter-btn {
      padding: 8px 18px;
      background-color: #fff;
      border: 2px solid #4F5C48; 
      color: #4F5C48;          
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
    }
    .filter-btn:hover, .filter-btn.active {
      background-color: #4F5C48; 
      color: white;
      box-shadow: 0 4px 10px rgba(79, 92, 72, 0.3); 
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px; /* 卡片間距稍微拉近一點 */
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
      border: 1px solid #eee;
      text-align: center;
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
    
    /* 🖼️ 圖片 1:1 (正方形) 空間設定 */
    .img-container {
      width: 100%;
      position: relative;
      padding-bottom: 100%;
      background-color: #fff;
      border-bottom: 1px solid #f5f5f5;
    }
    .card img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain; 
      padding: 10px; 
      box-sizing: border-box;
    }

    /* 👇 修正這裡的文字區塊間距 👇 */
    .card-content { 
      padding: 15px; /* 縮小內邊距 */
      flex-grow: 1; 
      display: flex; 
      flex-direction: column; 
      justify-content: flex-start; /* 讓文字靠上對齊，消除奇怪的空白 */
    }
    .card h3 { margin: 0 0 6px; font-size: 1.2em; color: #2c3e50; line-height: 1.3; } /* 標題下緣間距縮小 */
    .info-row { display: flex; align-items: center; justify-content: center; margin-bottom: 4px; font-size: 0.9em; color: #555; } /* 資訊行間距縮小 */
    .info-icon { width: 22px; margin-right: 4px; text-align: center; }

    .description { 
      margin-top: 8px; /* 描述上緣間距縮小 */
      font-size: 0.85em; 
      color: #7f8c8d; 
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 按鈕永遠貼齊卡片底部 */
    .footer { 
      padding: 0 15px 15px; /* 移除上方 padding 減少空白 */
      text-align: center; 
      margin-top: auto; /* 關鍵小技巧：把按鈕推到最下方 */
    }
    .bgg-link {
      display: block;
      padding: 8px; /* 按鈕稍微變秀氣一點 */
      background-color: #4F5C48; 
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9em;
      font-weight: bold;
    }
    .bgg-link:hover { background-color: #3d4738; } 
    #status-msg { margin: 20px; color: #666; font-style: italic; }
  </style>
</head>
<body>

  <h1>🎲 重雨桌遊櫃</h1>
  
  <div id="filter-container">
    <button class="filter-btn active" onclick="filterGames('全部', this)">全部</button>
  </div>

  <div id="status-msg">正在翻找桌遊櫃...</div>
  <div class="grid" id="bg-list"></div>

  <script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUS0MI9cUclJMJHd6yMJJUQFIFbl1G7XqRtMP5q5H1nMQOzTrcmdGTrn1R_QtEQC5dhkxuGhheKyKw/pub?output=csv'; 
    let allGames = [];

    Papa.parse(csvUrl, {
      download: true,
      header: true,
      skipEmptyLines: true,
      transformHeader: function(header) {
        return header.replace(/^\uFEFF/, '').trim().toUpperCase();
      },
      complete: function(results) {
        allGames = results.data.filter(game => game.NAME && game.NAME.trim() !== '');
        
        if (allGames.length === 0) {
          document.getElementById('status-msg').innerText = '讀取成功，但找不到任何有效桌遊資料。';
          return;
        }

        document.getElementById('status-msg').style.display = 'none';
        createFilterButtons();
        displayGames(allGames);
      }
    });

    function createFilterButtons() {
      const container = document.getElementById('filter-container');
      const types = new Set();
      
      allGames.forEach(game => {
        const typeStr = game.TYPE || '';
        if (typeStr) {
          typeStr.split(/[,，/ ]+/).forEach(t => {
            if(t.trim() !== '') types.add(t.trim());
          });
        }
      });

      Array.from(types).sort().forEach(type => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.innerText = type;
        btn.onclick = () => filterGames(type, btn);
        container.appendChild(btn);
      });
    }

    function filterGames(type, activeBtn) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      activeBtn.classList.add('active');

      const filtered = type === '全部' 
        ? allGames 
        : allGames.filter(game => {
            const gameType = game.TYPE || '';
            return gameType.includes(type);
          });
      
      displayGames(filtered);
    }

    function displayGames(games) {
      const container = document.getElementById('bg-list');
      container.innerHTML = '';

      games.forEach(game => {
        const name = game.NAME;
        const imgPath = game.IMAGE || 'https://via.placeholder.com/300x300?text=No+Image';
        const players = game.PLAYER || '--';
        const time = game.TIME || '--';
        const desc = game.DESCRIPTION || game.DESCRIP || '尚無內容介紹。';
        const bgg = game.BGGID;

        const card = document.createElement('div');
        card.className = 'card';

        const bggLink = bgg ? `<a href="https://boardgamegeek.com/boardgame/${bgg}" target="_blank" class="bgg-link">🔗 查看 BGG 詳情</a>` : '';

        card.innerHTML = `
          <div class="img-container">
            <img src="${imgPath}" alt="${name}" onerror="this.onerror=null; this.src='https://via.placeholder.com/300x300?text=Image+Error'">
          </div>
          <div class="card-content">
            <h3>${name}</h3>
            <div class="info-row"><span class="info-icon">👥</span> 人數：${players} 人</div>
            <div class="info-row"><span class="info-icon">⏳</span> 時間：${time} 分鐘</div>
            <div class="description">${desc}</div>
          </div>
          <div class="footer">${bggLink}</div>
        `;
        container.appendChild(card);
      });
    }
  </script>

</body>
</html>
