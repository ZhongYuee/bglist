<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重雨桌遊櫃</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f4f9; padding: 10px; text-align: center; }
    h1 { color: #333; margin-bottom: 10px; }
    
    #filter-container {
      margin-bottom: 15px; /* 原本 30px */
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 5px; /* 原本 10px */
    }
    .filter-btn {
      padding: 6px 14px; /* 原本 8px 18px，保留一點大小讓手指好點擊 */
      background-color: #fff;
      border: 2px solid #4F5C48; 
      color: #4F5C48;          
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
    }
    .filter-btn:hover, .filter-btn.active {
      background-color: #4F5C48; 
      color: white;
      box-shadow: 0 4px 10px rgba(79, 92, 72, 0.3); 
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px; /* 卡片之間的距離，原本 25px */
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
      border: 1px solid #eee;
      text-align: left;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
    
    .img-container {
      width: 100%;
      height: 200px; /* 配合整體緊湊感，圖片區塊稍微縮短 */
      background-color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px; /* 原本 10px */
      box-sizing: border-box;
      border-bottom: 1px solid #f5f5f5;
    }
    .card img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .card-content { padding: 10px; flex-grow: 1; } /* 卡片內文四周留白，原本 20px */
    .card h3 { margin: 0 0 6px; font-size: 1.15em; color: #2c3e50; line-height: 1.3; } /* 標題下方留白，原本 12px */
    .info-row { display: flex; align-items: center; margin-bottom: 4px; font-size: 0.9em; color: #555; } /* 原本 8px */
    .info-icon { width: 22px; margin-right: 4px; text-align: center; } /* 圖示與文字間距縮小 */

    .description { 
      margin-top: 6px; /* 原本 12px */
      font-size: 0.85em; 
      color: #7f8c8d; 
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .footer { padding: 8px 10px 10px; text-align: center; } /* 按鈕外圍留白砍半 */
    .bgg-link {
      display: block;
      padding: 6px; /* 按鈕內圍留白，原本 10px */
      background-color: #4F
