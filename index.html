<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重雨桌遊櫃</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
    h1 { color: #333; margin-bottom: 20px; }
    
    #filter-container {
      margin-bottom: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .filter-btn {
      padding: 8px 18px;
      background-color: #fff;
      border: 2px solid #4F5C48; 
      color: #4F5C48;          
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
    }
    .filter-btn:hover, .filter-btn.active {
      background-color: #4F5C48; 
      color: white;
      box-shadow: 0 4px 10px rgba(79, 92, 72, 0.3); 
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
      border: 1px solid #eee;
      text-align: left;
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
    
    .img-container {
      width: 100%;
      height: 250px;
      background-color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      box-sizing: border-box;
      border-bottom: 1px solid #f5f5f5;
    }
    .card img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .card-content { padding: 20px; flex-grow: 1; }
    .card h3 { margin: 0 0 12px; font-size: 1.25em; color: #2c3e50; line-height: 1.3; }
    .info-row { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.95em; color: #555; }
    .info-icon { width: 22px; margin-right: 8px; text-align: center; }

    .description { 
      margin-top: 12px; 
      font-size: 0.9em; 
      color: #7f8c8d; 
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .footer { padding: 15px 20px 20px; text-align: center; }
    .bgg-link {
      display: block;
      padding: 10px;
      background-color: #4F5C48; 
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9em;
      font-weight: bold;
    }
    .bgg-link:hover { background-color: #3d4738; } 
    #status-msg { margin: 20px; color: #666; font-style: italic; }
  </style>
</head>
<body>

  <h1>🎲 重雨桌遊櫃</h1>
  
  <div id="filter-container">
    <button class="filter-btn active" onclick="filterGames('全部', this)">全部</button>
  </div>

  <div id="status-msg">正在翻找桌遊
